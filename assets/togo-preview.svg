<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Togo trip placeholder</title>
  <desc id="desc">Editorial placeholder for the newly completed Togo trip while photos are being curated.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1419"/>
      <stop offset="55%" stop-color="#16313a"/>
      <stop offset="100%" stop-color="#2f6b77"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0b44f"/>
      <stop offset="50%" stop-color="#57c0cb"/>
      <stop offset="100%" stop-color="#f1e6d2"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1260" cy="240" r="240" fill="rgba(255,255,255,0.06)"/>
  <circle cx="300" cy="980" r="320" fill="rgba(224,180,79,0.12)"/>
  <rect x="112" y="110" width="220" height="40" rx="20" fill="rgba(255,255,255,0.08)"/>
  <text x="145" y="137" fill="#f1e6d2" font-family="Arial, sans-serif" font-size="24" letter-spacing="5">JUST BACK</text>
  <text x="112" y="520" fill="#f7f0e6" font-family="Georgia, serif" font-size="220" font-weight="700" letter-spacing="-8">TOGO</text>
  <rect x="112" y="584" width="650" height="8" rx="4" fill="url(#line)"/>
  <text x="112" y="680" fill="#f7f0e6" font-family="Georgia, serif" font-size="68" font-style="italic">Story landing soon.</text>
  <text x="112" y="760" fill="#d9d2c6" font-family="Arial, sans-serif" font-size="34">The trip is done. Photos, route notes, and the full memory catalogue are being sorted now.</text>
</svg>
