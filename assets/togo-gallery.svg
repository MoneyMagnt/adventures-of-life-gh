  <text x="120" y="740" fill="#f0e5d8" font-family="Arial, sans-serif" font-size="34">If you want first access when the trip story lands, ask early.</text>
  <circle cx="1280" cy="340" r="170" fill="rgba(255,255,255,0.07)"/>
  <circle cx="1320" cy="860" r="250" fill="rgba(243,215,162,0.10)"/>
