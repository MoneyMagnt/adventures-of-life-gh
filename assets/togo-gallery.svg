<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Togo gallery placeholder</title>
  <desc id="desc">Placeholder visual for the upcoming Togo photo gallery.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131012"/>
      <stop offset="50%" stop-color="#3f2b22"/>
      <stop offset="100%" stop-color="#8f5f3e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg3)"/>
  <text x="120" y="220" fill="#f3d7a2" font-family="Arial, sans-serif" font-size="24" letter-spacing="5">PHOTOS LOADING</text>
  <text x="120" y="500" fill="#fff7ed" font-family="Georgia, serif" font-size="150" font-weight="700" letter-spacing="-4">Next memory</text>
